name: PHP Lint & CS Fixer

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  php-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2' # Ajuste para a versão do seu projeto

      - name: Instalar dependências
        run: composer install --prefer-dist --no-progress

      - name: Rodar Linter (Sintaxe)
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Rodar PHP CS Fixer (Verificação)
        run: ./vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --dry-run --diff